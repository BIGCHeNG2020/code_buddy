<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库问答系统</title>
    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Ant Design CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5/dist/reset.css">
    <!-- Ant Design JS -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/antd@5/dist/antd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        #root {
            min-height: 100vh;
        }
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .main-card {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            color: #1890ff;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .header p {
            color: #666;
        }
        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 16px;
            background: #fafafa;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
        }
        .message-user {
            background: #1890ff;
            color: white;
            margin-left: auto;
        }
        .message-bot {
            background: white;
            border: 1px solid #e8e8e8;
        }
        .message-source {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #e8e8e8;
            font-size: 12px;
            color: #888;
        }
        .input-area {
            display: flex;
            gap: 12px;
        }
        .sidebar {
            background: #fafafa;
            padding: 16px;
            border-radius: 8px;
            height: 100%;
        }
        .document-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: white;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #e8e8e8;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online {
            background: #52c41a;
        }
        .status-offline {
            background: #ff4d4f;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #1890ff;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Layout, Menu, Card, Input, Button, message, Upload, Modal, 
            List, Tag, Space, Spin, Empty, Tooltip, Badge, Statistic,
            Row, Col, Divider, Typography, Popconfirm
        } = antd;
        const { Header, Sider, Content } = Layout;
        const { TextArea } = Input;
        const { Title, Text, Paragraph } = Typography;
        const { Dragger } = Upload;

        // API基础URL
        const API_BASE = 'http://localhost:8000/api';

        // 主应用组件
        function App() {
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [loading, setLoading] = useState(false);
            const [documents, setDocuments] = useState([]);
            const [systemStatus, setSystemStatus] = useState({});
            const [activeTab, setActiveTab] = useState('chat');
            const [addDocModal, setAddDocModal] = useState(false);
            const [newDocContent, setNewDocContent] = useState('');
            const [newDocName, setNewDocName] = useState('');
            const chatContainerRef = useRef(null);

            // 获取系统状态
            const fetchStatus = async () => {
                try {
                    const res = await fetch(`${API_BASE}/status`);
                    const data = await res.json();
                    setSystemStatus(data);
                } catch (e) {
                    console.error('获取状态失败:', e);
                }
            };

            // 获取文档列表
            const fetchDocuments = async () => {
                try {
                    const res = await fetch(`${API_BASE}/documents`);
                    const data = await res.json();
                    setDocuments(data);
                } catch (e) {
                    console.error('获取文档列表失败:', e);
                }
            };

            useEffect(() => {
                fetchStatus();
                fetchDocuments();
            }, []);

            // 自动滚动到底部
            useEffect(() => {
                if (chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
            }, [messages]);

            // 发送问题
            const handleSend = async () => {
                if (!inputValue.trim()) return;
                
                const question = inputValue.trim();
                setInputValue('');
                
                // 添加用户消息
                setMessages(prev => [...prev, { type: 'user', content: question }]);
                setLoading(true);

                try {
                    const res = await fetch(`${API_BASE}/ask`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question })
                    });
                    const data = await res.json();
                    
                    setMessages(prev => [...prev, { 
                        type: 'bot', 
                        content: data.answer,
                        sources: data.sources,
                        hasAnswer: data.has_answer
                    }]);
                } catch (e) {
                    setMessages(prev => [...prev, { 
                        type: 'bot', 
                        content: '抱歉，服务暂时不可用，请检查后端是否正常运行。',
                        hasAnswer: false
                    }]);
                }
                
                setLoading(false);
            };

            // 上传文件
            const handleUpload = async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const res = await fetch(`${API_BASE}/documents/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    message.success(data.message);
                    fetchDocuments();
                } catch (e) {
                    message.error('上传失败');
                }
                return false;
            };

            // 添加文本文档
            const handleAddDocument = async () => {
                if (!newDocName.trim() || !newDocContent.trim()) {
                    message.warning('请填写文档名称和内容');
                    return;
                }
                
                const formData = new FormData();
                formData.append('filename', newDocName);
                formData.append('content', newDocContent);
                
                try {
                    const res = await fetch(`${API_BASE}/documents/text`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    message.success(data.message);
                    setAddDocModal(false);
                    setNewDocName('');
                    setNewDocContent('');
                    fetchDocuments();
                } catch (e) {
                    message.error('添加失败');
                }
            };

            // 删除文档
            const handleDeleteDocument = async (filename) => {
                try {
                    const res = await fetch(`${API_BASE}/documents/${encodeURIComponent(filename)}`, {
                        method: 'DELETE'
                    });
                    const data = await res.json();
                    message.success(data.message);
                    fetchDocuments();
                } catch (e) {
                    message.error('删除失败');
                }
            };

            // 重建索引
            const handleRebuild = async () => {
                message.loading({ content: '正在重建索引...', key: 'rebuild' });
                try {
                    const res = await fetch(`${API_BASE}/rebuild`, { method: 'POST' });
                    const data = await res.json();
                    message.success({ content: data.message, key: 'rebuild' });
                    fetchStatus();
                } catch (e) {
                    message.error({ content: '重建失败', key: 'rebuild' });
                }
            };

            // 渲染消息
            const renderMessage = (msg, index) => {
                const isUser = msg.type === 'user';
                return (
                    <div key={index} className={`message ${isUser ? 'message-user' : 'message-bot'}`}>
                        <div>{msg.content}</div>
                        {msg.sources && msg.sources.length > 0 && (
                            <div className="message-source">
                                <div><strong>来源:</strong></div>
                                {msg.sources.map((s, i) => (
                                    <div key={i}>
                                        • {s.source} (相关度: {(1 - s.score).toFixed(2)})
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="app-container">
                    <Card className="main-card">
                        <div className="header">
                            <Title level={2} style={{ color: '#1890ff', marginBottom: 8 }}>
                                📚 知识库问答系统
                            </Title>
                            <Text type="secondary">
                                基于LangChain + Chroma + FastAPI + React构建
                            </Text>
                        </div>

                        <Row gutter={24}>
                            <Col span={18}>
                                <Card 
                                    title="💬 对话" 
                                    bordered={false}
                                    extra={
                                        <Space>
                                            <Badge 
                                                dot 
                                                color={systemStatus.has_llm ? 'green' : 'orange'}
                                                text={systemStatus.has_llm ? 'LLM已连接' : 'LLM未配置(检索模式)'}
                                            />
                                        </Space>
                                    }
                                >
                                    <div 
                                        className="chat-container" 
                                        ref={chatContainerRef}
                                    >
                                        {messages.length === 0 ? (
                                            <Empty 
                                                description="开始提问吧！系统会根据知识库内容回答您的问题"
                                                style={{ marginTop: 100 }}
                                            />
                                        ) : (
                                            messages.map(renderMessage)
                                        )}
                                        {loading && (
                                            <div className="message message-bot">
                                                <div className="typing-indicator">
                                                    <span className="typing-dot"></span>
                                                    <span className="typing-dot"></span>
                                                    <span className="typing-dot"></span>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="input-area">
                                        <Input
                                            placeholder="输入您的问题..."
                                            value={inputValue}
                                            onChange={e => setInputValue(e.target.value)}
                                            onPressEnter={handleSend}
                                            size="large"
                                        />
                                        <Button 
                                            type="primary" 
                                            size="large"
                                            onClick={handleSend}
                                            loading={loading}
                                        >
                                            发送
                                        </Button>
                                    </div>
                                </Card>
                            </Col>

                            <Col span={6}>
                                <Card 
                                    title="📁 知识库" 
                                    bordered={false}
                                    extra={
                                        <Button 
                                            type="link" 
                                            size="small"
                                            onClick={handleRebuild}
                                        >
                                            重建索引
                                        </Button>
                                    }
                                >
                                    <Statistic 
                                        title="文档数量" 
                                        value={systemStatus.documents_count || 0}
                                        suffix="个"
                                        style={{ marginBottom: 16 }}
                                    />
                                    
                                    <Button 
                                        type="dashed" 
                                        block 
                                        onClick={() => setAddDocModal(true)}
                                        style={{ marginBottom: 12 }}
                                    >
                                        + 添加文档
                                    </Button>
                                    
                                    <Upload
                                        beforeUpload={handleUpload}
                                        showUploadList={false}
                                        accept=".txt,.md"
                                    >
                                        <Button block>📤 上传文件</Button>
                                    </Upload>
                                    
                                    <Divider />
                                    
                                    <div style={{ maxHeight: 200, overflow: 'auto' }}>
                                        {documents.map(doc => (
                                            <div className="document-item" key={doc.filename}>
                                                <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                                    <Tag color={doc.type === 'markdown' ? 'purple' : 'blue'}>
                                                        {doc.type === 'markdown' ? 'MD' : 'TXT'}
                                                    </Tag>
                                                    {doc.filename}
                                                </span>
                                                <Popconfirm
                                                    title="确定删除此文档？"
                                                    onConfirm={() => handleDeleteDocument(doc.filename)}
                                                >
                                                    <Button type="text" danger size="small">删</Button>
                                                </Popconfirm>
                                            </div>
                                        ))}
                                        {documents.length === 0 && (
                                            <Text type="secondary">暂无文档</Text>
                                        )}
                                    </div>
                                </Card>
                            </Col>
                        </Row>
                    </Card>

                    {/* 添加文档弹窗 */}
                    <Modal
                        title="添加知识文档"
                        open={addDocModal}
                        onOk={handleAddDocument}
                        onCancel={() => setAddDocModal(false)}
                        width={600}
                    >
                        <div style={{ marginBottom: 16 }}>
                            <Text>文档名称：</Text>
                            <Input
                                placeholder="例如：产品介绍.txt"
                                value={newDocName}
                                onChange={e => setNewDocName(e.target.value)}
                            />
                        </div>
                        <div>
                            <Text>文档内容：</Text>
                            <TextArea
                                rows={10}
                                placeholder="输入知识内容..."
                                value={newDocContent}
                                onChange={e => setNewDocContent(e.target.value)}
                            />
                        </div>
                    </Modal>
                </div>
            );
        }

        // 渲染应用
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
